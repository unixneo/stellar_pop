benchmarks:
  - key: ngc3379
    name: NGC3379
    type: elliptical
    benchmark_type: old_elliptical_ssp_like
    ra: 161.9570
    dec: 12.5847
    photometry:
      u: 11.85
      g: 10.68
      r: 10.01
      i: 9.67
      z: 9.38
      redshift_z: 0.003704
    expected:
      age_gyr_min: 8.0
      age_gyr_max: 12.0
      metallicity_z_min: 0.01
      metallicity_z_max: 0.03
      sfh_models: [exponential, burst]
    notes: >
      Literature indicates an old population (>8 Gyr) with near-solar metallicity.
    references:
      - "Terlevich & Forbes 2002, MNRAS 330, 547"
      - "Gregg et al. 2004, AJ 127, 1441"

  - key: m101
    name: M101
    type: spiral
    benchmark_type: composite_spiral_not_single_ssp
    ra: 210.8023
    dec: 54.3490
    photometry:
      u: 9.21
      g: 8.35
      r: 7.86
      i: 7.61
      z: 7.44
      redshift_z: 0.000804
    expected:
      age_gyr_min: 0.3
      age_gyr_max: 7.0
      metallicity_z_min: 0.002
      metallicity_z_max: 0.02
      sfh_models: [exponential, delayed_exponential, constant, burst]
    notes: >
      Composite late-type system. Do not treat as a single-SSP age target.
      Use disk-mean + recent-burst interpretation for comparison.
    references:
      - "Lin et al. 2013, arXiv:1304.3017"
      - "Merritt et al. 2016, arXiv:1806.06828"

  - key: m87
    name: M87
    type: elliptical
    benchmark_type: old_elliptical_ssp_like
    ra: 187.7059
    dec: 12.3911
    photometry:
      u: 10.11
      g: 9.42
      r: 8.97
      i: 8.68
      z: 8.49
      redshift_z: 0.0
    expected:
      age_gyr_min: 10.0
      age_gyr_max: 14.0
      metallicity_z_min: 0.018
      metallicity_z_max: 0.03
      sfh_models: [exponential, burst]
    notes: >
      Do not use formal SSP age saturation values (~17.7 Gyr) literally.
      Treat as an old, radially age-flat system with central supersolar
      metallicity declining toward near-solar.
    references:
      - "Kuntschner et al. 2010, MNRAS"
      - "Montes et al. 2014, MNRAS 439, 990"

  - key: ngc4459
    name: NGC4459
    type: lenticular
    benchmark_type: central_young_disc_plus_older_body
    ra: 187.0004
    dec: 13.9786
    photometry:
      u: 12.81
      g: 11.62
      r: 10.92
      i: 10.57
      z: 10.28
      redshift_z: 0.003981
    expected:
      age_gyr_min: 3.2
      age_gyr_max: 7.8
      metallicity_z_min: 0.014
      metallicity_z_max: 0.03
      sfh_models: [exponential, delayed_exponential, constant, burst]
    notes: >
      Strong benchmark: young central component (~3.5 Gyr) embedded in an older
      body (~7.1 Gyr), with metallicity declining from supersolar center to
      subsolar at larger radius.
    references:
      - "Kuntschner et al. 2010, MNRAS"
